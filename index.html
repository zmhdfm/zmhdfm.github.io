<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zmh等风眠的小站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1c;
            --surface: #222226;
            --on-surface: #e6e6e8;
            --on-surface-variant: #a1a1a6;
            --primary: #ff9e80;
            --border-radius: 24px;
            --transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
            --glow: 0 0 20px rgba(255, 158, 128, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--on-surface);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        button, a { outline: none; }

        /* === 汉堡菜单按钮 === */
        .menu-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 50;
            transition: var(--transition);
            border: none;
        }

        .menu-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }

        .menu-btn span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--on-surface);
            border-radius: 2px;
            transition: var(--transition);
        }

        .menu-btn span:nth-child(1) { transform: translateY(0); }
        .menu-btn span:nth-child(2) { margin: 4px 0; }
        .menu-btn span:nth-child(3) { transform: translateY(0); }

        .menu-btn.active span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .menu-btn.active span:nth-child(2) { opacity: 0; }
        .menu-btn.active span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* === 侧滑面板 === */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            box-shadow: -8px 0 24px rgba(0, 0, 0, 0.4);
            transition: var(--transition);
            z-index: 60;
            padding: 32px 24px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { left: 0; }

        .sidebar-header {
            margin-bottom: 16px;
        }

        .title-lg { font-size: 1.4rem; font-weight: 600; color: var(--on-surface); margin-bottom: 8px; }
        .subtitle { font-size: 1rem; color: var(--on-surface-variant); margin-bottom: 16px; }

        .home-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: var(--on-surface);
            text-align: center;
            text-decoration: none;
            margin-bottom: 12px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .articles-count {
            font-size: 0.9rem;
            color: var(--on-surface-variant);
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .contact-section { flex: 1; }

        .contact-section > div { margin-bottom: 16px; }
        .title-md { font-size: 1.15rem; font-weight: 500; color: var(--on-surface); margin-bottom: 12px; }

        /* === 联系卡片 === */
        .contact-card {
            background: color-mix(in srgb, var(--on-surface) 5%, var(--surface));
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            display: block;
        }

        .contact-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            border-color: rgba(255, 158, 128, 0.2);
        }

        .contact-card-title { font-size: 0.95rem; color: var(--on-surface-variant); margin-bottom: 4px; }
        .contact-card-value { font-size: 1rem; color: var(--on-surface); font-weight: 500; word-break: break-all; }

        .runtime {
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            color: var(--on-surface-variant);
            text-align: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 55;
        }

        .overlay.active { opacity: 1; visibility: visible; }

        /* === 主内容区 === */
        .container { max-width: 680px; margin: 0 auto; padding: 0 20px; }

        .typewriter-bar {
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .typewriter-lines {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            max-width: 500px;
            white-space: normal;
            color: var(--on-surface);
        }

        .line-1 { margin-bottom: 4px; }
        .line-2 { }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 70%;
            background: var(--on-surface);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cards { display: grid; gap: 16px; margin-top: 24px; }

        .card {
            background: var(--surface);
            border-radius: var(--border-radius);
            padding: 20px 20px 16px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 10px; }
        .card-desc { color: var(--on-surface-variant); margin-bottom: 14px; font-size: 0.9rem; line-height: 1.5; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
        .tag {
            background: rgba(255, 158, 128, 0.1);
            color: var(--primary);
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }

        .btn {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--on-surface);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #ff7a5c);
            color: white;
            box-shadow: var(--glow), 0 3px 10px rgba(255, 158, 128, 0.3);
        }

        footer {
            text-align: center;
            padding: 20px 0;
            color: var(--on-surface-variant);
            font-size: 0.75rem;
            margin-top: 20px;
        }

        @media (max-width: 640px) {
            .sidebar { width: 260px; }
            .typewriter-bar { height: 160px; }
            .typewriter-lines { font-size: 1.35rem; }
        }
    </style>
</head>
<body>
    <!-- 汉堡菜单按钮 -->
    <button class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- 侧滑面板 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="title-lg">关于本站</div>
            <div class="subtitle">一个玩机爱好者</div>
            
            <a href="https://zmhdfm.github.io/" class="home-btn">首页</a>
            <div class="articles-count" id="articlesCount">文章: 0 篇</div>
        </div>

        <div class="contact-section">
            <div>
                <div class="title-md">联系</div>
                
                <a href="mailto:gathering-light@outlook.com" class="contact-card">
                    <div class="contact-card-title">邮箱</div>
                    <div class="contact-card-value">gathering-light@outlook.com</div>
                </a>
                
                <a href="https://space.bilibili.com/3632299576920713" target="_blank" class="contact-card">
                    <div class="contact-card-title">哔哩哔哩</div>
                    <div class="contact-card-value">UID: 3632299576920713</div>
                </a>
                
                <a href="https://github.com/zmhdfm" target="_blank" class="contact-card">
                    <div class="contact-card-title">GitHub</div>
                    <div class="contact-card-value">github.com/zmhdfm</div>
                </a>
            </div>
        </div>

        <div class="runtime" id="runtime">运行时间: 0 天 0 小时 0 分钟</div>
    </div>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>

    <!-- 主内容 -->
    <div class="typewriter-bar">
        <div class="typewriter-lines">
            <div class="line-1">Hi 这里是zmh等风眠的</div>
            <div class="line-2"></div>
        </div>
    </div>

    <div class="container">
        <section class="cards">
            <div class="card">
                <h3 class="card-title">应用下载</h3>
                <p class="card-desc">安卓老版本应用，手表应用商店</p>
                <div class="tags">
                    <span class="tag">软件</span>
                </div>
                <div class="btn-group">
                    <a href="https://zmhdfm.github.io/navigation/" class="btn btn-primary">进入</a>
                </div>
            </div>
        </section>

        <footer>
            <p>© 2026 zmh等风眠的小站</p>
        </footer>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const openSidebar = () => {
            sidebar.classList.add('active');
            overlay.classList.add('active');
            menuBtn.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        const closeSidebar = () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            menuBtn.classList.remove('active');
            document.body.style.overflow = '';
        };

        menuBtn.addEventListener('click', openSidebar);
        overlay.addEventListener('click', closeSidebar);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('active')) {
                closeSidebar();
            }
        });

        // 打字机动画
        const line1El = document.querySelector('.line-1');
        const line2El = document.querySelector('.line-2');
        const cursor = document.querySelector('.cursor');

        const text1 = 'Hi 这里是zmh等风眠的';
        const text2 = '小站';
        let index1 = 0;
        let index2 = 0;
        const speed = 55;

        function typeLine1() {
            if (index1 < text1.length) {
                line1El.textContent = text1.substring(0, index1 + 1);
                index1++;
                setTimeout(typeLine1, speed);
            } else {
                setTimeout(() => {
                    line2El.textContent = '';
                    typeLine2();
                }, 10);
            }
        }

        function typeLine2() {
            if (index2 < text2.length) {
                line2El.textContent = text2.substring(0, index2 + 1);
                index2++;
                setTimeout(typeLine2, speed);
            } else {
                cursor.style.opacity = '0';
            }
        }

        setTimeout(typeLine1, 300);

        // 动态获取文章数量
        const cardCount = document.querySelectorAll('.card').length;
        document.getElementById('articlesCount').textContent = `文章: ${cardCount} 篇`;

        // 运行时间计算
        const startTime = new Date('2026-07-05T00:00:00').getTime();
        const runtimeElement = document.getElementById('runtime');

        function updateRuntime() {
            const now = new Date().getTime();
            const diff = now - startTime;
            if (diff < 0) return;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            runtimeElement.textContent = `运行时间: ${days} 天 ${hours} 小时 ${minutes} 分钟`;
        }

        updateRuntime();
        setInterval(updateRuntime, 60000);

        if (/iP(hone|ad)/.test(navigator.userAgent)) {
            document.body.style.height = '100vh';
            window.addEventListener('load', () => document.body.style.overflow = '');
        }
    </script>
</body>
</html>
